<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>First Time Setup - Daygle Server Manager</title>
    <link rel="stylesheet" href="/static/vendor/fontawesome/all.min.css" />
    <link rel="stylesheet" href="/static/css/styles.css" />
  </head>
  <body class="auth-page">
    <div class="auth-card panel">
      <h1>First Time Setup</h1>
      <p>Create your first administrator account.</p>

      {% if flash %}
      <div class="flash flash-{{ flash.type }}">{{ flash.message }}</div>
      {% endif %}

      <form method="post" action="/setup" class="auth-form">
        <label>Username <input name="username" required minlength="3" /></label>
        <label>Password <input type="password" name="password" required minlength="8" /></label>
        <label>Confirm Password <input type="password" name="confirm_password" required minlength="8" /></label>
        <label>First Name <input name="first_name" /></label>
        <label>Last Name <input name="last_name" /></label>
        <label>Email <input name="email" type="email" /></label>
        <button type="submit"><i class="fas fa-user-plus"></i>Create Admin Account</button>
      </form>
    </div>
  </body>
</html>
