<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>First Time Setup - Daygle Server Manager</title>
    <link rel="icon" type="image/png" href="/static/daygle.png" />
    <link rel="stylesheet" href="/static/vendor/fontawesome/all.min.css" />
    <link rel="stylesheet" href="/static/css/styles.css" />
    <script>
      (function () {
        const savedTheme = localStorage.getItem("theme") || "system";
        const systemTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        const appliedTheme = savedTheme === "system" ? systemTheme : savedTheme;
        document.documentElement.setAttribute("data-theme", appliedTheme);
      })();
    </script>
  </head>
  <body class="auth-page">
    <button type="button" class="auth-page-theme-toggle" id="authThemeToggle" title="Toggle Theme">
      <i class="fas fa-sun" id="authThemeIconLight"></i>
      <i class="fas fa-moon" id="authThemeIconDark" style="display: none;"></i>
    </button>

    <div class="auth-container visible">
      <div class="auth-card wide visible">
        <div class="auth-header">
          <img id="logo" src="/static/daygle.png" alt="Daygle" class="auth-logo" />
          <h1 class="auth-title large">Welcome to Daygle Server Manager</h1>
          <p class="auth-subtitle large">Create your first administrator account to get started.</p>
        </div>

        <div class="auth-info">
          <i class="fas fa-info-circle"></i>
          <strong>First Time Setup:</strong> This account will have full access to all system features.
        </div>

        <form method="post" action="/setup" class="auth-form">
          <div class="form-group">
            <label for="username" class="form-label">Username <span class="text-danger">*</span></label>
            <input type="text" id="username" name="username" class="form-control" minlength="3" placeholder="administrator" autofocus required />
            <small class="form-text">Must be at least 3 characters.</small>
          </div>

          <div class="two-col-grid">
            <div class="form-group">
              <label for="first_name" class="form-label">First Name</label>
              <input type="text" id="first_name" name="first_name" class="form-control" placeholder="John" />
            </div>
            <div class="form-group">
              <label for="last_name" class="form-label">Last Name</label>
              <input type="text" id="last_name" name="last_name" class="form-control" placeholder="Smith" />
            </div>
          </div>

          <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="admin@example.com" autocomplete="email" />
          </div>

          <div class="two-col-grid">
            <div class="form-group">
              <label for="password" class="form-label">Password <span class="text-danger">*</span></label>
              <input type="password" id="password" name="password" class="form-control" minlength="8" required />
              <small class="form-text">Must be at least 8 characters.</small>
            </div>
            <div class="form-group">
              <label for="confirm_password" class="form-label">Confirm Password <span class="text-danger">*</span></label>
              <input type="password" id="confirm_password" name="confirm_password" class="form-control" minlength="8" required />
            </div>
          </div>

          <div class="form-actions mt-4">
            <button type="submit" class="btn btn-primary">
              <i class="fas fa-rocket"></i>
              <span>Create Administrator</span>
            </button>
          </div>
        </form>
      </div>
    </div>

    <script>
      (function () {
        {% if flash %}
        window.__initialFlash = {{ flash|tojson }};
        {% endif %}
      })();
    </script>
    <script src="/static/js/toast.js"></script>

    <script>
      (function () {
        const themeToggle = document.getElementById("authThemeToggle");
        const lightIcon = document.getElementById("authThemeIconLight");
        const darkIcon = document.getElementById("authThemeIconDark");
        const logo = document.getElementById("logo");

        function effectiveTheme() {
          const current = localStorage.getItem("theme") || "system";
          if (current === "system") {
            return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          return current;
        }

        function updateUi(theme) {
          const isDark = theme === "dark";
          lightIcon.style.display = isDark ? "none" : "inline";
          darkIcon.style.display = isDark ? "inline" : "none";
          logo.src = isDark ? "/static/daygle-light.png" : "/static/daygle.png";
        }

        function applyThemePreference(pref) {
          localStorage.setItem("theme", pref);
          const theme = pref === "system"
            ? (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
            : pref;
          document.documentElement.setAttribute("data-theme", theme);
          updateUi(theme);
        }

        const startingTheme = effectiveTheme();
        document.documentElement.setAttribute("data-theme", startingTheme);
        updateUi(startingTheme);

        themeToggle.addEventListener("click", function () {
          const current = localStorage.getItem("theme") || "system";
          const next = current === "light" ? "dark" : current === "dark" ? "system" : "light";
          applyThemePreference(next);
        });

        window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function () {
          if ((localStorage.getItem("theme") || "system") === "system") {
            applyThemePreference("system");
          }
        });
      })();
    </script>
  </body>
</html>
