{% extends "base.html" %}

{% block page_title %}User Settings - Daygle Server Manager{% endblock %}
{% block title %}User Settings{% endblock %}

{% block content %}
<section class="panel">
  <h2>Display Preferences</h2>
  <form method="post" action="/user-settings/save-all" class="grid-form">
    <label>
      Date and Time Format
      <select name="date_format" required>
        <option value="global" {% if selected_user_date_format == 'global' %}selected{% endif %}>Use global default</option>
        {% for option_key, option_label, _ in date_format_options %}
        <option value="{{ option_key }}" {% if selected_user_date_format == option_key %}selected{% endif %}>
          {{ option_label }}
        </option>
        {% endfor %}
      </select>
    </label>
    <label>
      Timezone
      <select name="timezone_name" required>
        <option value="global" {% if selected_user_timezone == 'global' %}selected{% endif %}>Use global default</option>
        {% for tz_value, tz_label in timezone_options %}
        <option value="{{ tz_value }}" {% if selected_user_timezone == tz_value %}selected{% endif %}>{{ tz_label }}</option>
        {% endfor %}
      </select>
    </label>
    <button type="submit">Save User Settings</button>
  </form>
  <p class="field-help">Your personal settings override the global date format and timezone only for your account.</p>
</section>
{% endblock %}
