services:
  db:
    image: postgres:16-alpine
    container_name: daygle-server-manager-db
    env_file:
      - ./daygle_server_manager.conf
    environment:
      POSTGRES_USER: daygle_server_manager
      POSTGRES_DB: daygle_server_manager
    volumes:
      - ./db/data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daygle_server_manager -d daygle_server_manager"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./api
    container_name: daygle-server-manager-api
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./ssh_keys:/ssh_keys:ro
      - ./daygle_server_manager.conf:/config/daygle_server_manager.conf:ro
    restart: unless-stopped

  worker:
    build:
      context: ./worker
    container_name: daygle-server-manager-worker
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - ./daygle_server_manager.conf:/config/daygle_server_manager.conf:ro
    restart: unless-stopped
